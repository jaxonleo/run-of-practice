<!--
  Branded sign-in-code (OTP) email, matching the notify-org-invite /
  notify-team-staff-added look (supabase/functions/_shared/emailTemplate.ts).
  Wired up live via config.toml's [auth.email.template.magic_link]
  (content_path points here) and pushed via `supabase config push` --
  config.toml was reconciled against the live project's real Auth settings
  first (2026-07-22), so it's safe to push from now on. This app calls
  signInWithOtp(), which sends through the Magic Link template; {{ .Token }}
  is what makes it render as a code instead of a clickable link.
-->
<!doctype html>
<html>
<body style="margin:0;padding:0;background:#f2f5f3;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f2f5f3;padding:32px 16px;">
    <tr><td align="center">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background:#ffffff;border-radius:14px;overflow:hidden;border:1px solid #dde5e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
        <tr><td style="background:#111714;padding:18px 28px;">
          <table role="presentation" cellpadding="0" cellspacing="0"><tr>
            <td style="padding-right:10px;"><img src="https://www.runofpractice.com/icon-512.png" width="34" height="34" alt="" style="display:block;border-radius:8px;"></td>
            <td style="font-size:19px;font-weight:800;color:#ffffff;letter-spacing:.01em;vertical-align:middle;">Run of Practice</td>
          </tr></table>
        </td></tr>
        <tr><td style="padding:32px 28px 8px;">
          <h1 style="margin:0 0 14px;font-size:21px;font-weight:800;color:#111714;line-height:1.35;">Your sign-in code</h1>
          <div style="font-size:15px;line-height:1.65;color:#2c3830;">
            <p style="margin:0 0 20px;">Enter this code to finish signing in. It expires in 5 minutes.</p>
          </div>
        </td></tr>
        <tr><td style="padding:0 28px 8px;">
          <div style="background:#f7f9f8;border:1px solid #eef2f0;border-radius:10px;padding:18px;text-align:center;">
            <span style="font-family:'SF Mono',Consolas,Menlo,monospace;font-size:32px;font-weight:700;letter-spacing:.28em;color:#111714;">{{ .Token }}</span>
          </div>
        </td></tr>
        <tr><td style="padding:16px 28px 32px;">
          <p style="margin:0;font-size:13px;color:#6b7a72;line-height:1.5;">If you didn't request this, you can safely ignore this email.</p>
        </td></tr>
        <tr><td style="padding:16px 28px;background:#f7f9f8;border-top:1px solid #eef2f0;">
          <p style="margin:0;font-size:12px;color:#8a9a91;">Practice planning and live execution · <a href="https://www.runofpractice.com" style="color:#8a9a91;">runofpractice.com</a></p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
