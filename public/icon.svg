<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b4332"/>
      <stop offset="100%" stop-color="#081c11"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="96" y="104" width="320" height="16" rx="8" fill="#52b788"/>

  <!-- ROP - tight, heavy, geometric -->
  <text
    x="256"
    y="318"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="196"
    font-weight="900"
    font-style="normal"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="-6"
  >ROP</text>

  <!-- RUN OF PRACTICE - spaced caps -->
  <text
    x="256"
    y="374"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-size="36"
    font-weight="400"
    fill="#52b788"
    text-anchor="middle"
    letter-spacing="6"
  >RUN OF PRACTICE</text>

  <!-- Bottom accent bar -->
  <rect x="96" y="400" width="320" height="16" rx="8" fill="#2d6a4f"/>
</svg>
